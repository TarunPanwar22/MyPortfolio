[build]
  base = "infallible-shadow-lwz5z4-main"
  command = "npm install && npm run build"
  publish = "infallible-shadow-lwz5z4-main/build"

[build.environment]
  NODE_ENV = "production"
  CI = "false"
  SECRETS_SCAN_ENABLED = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200